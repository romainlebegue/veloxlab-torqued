version: "3.9"

# Local full-stack: Flaresolverr + scraper runner
# Supabase runs separately via `supabase start` (Docker managed by Supabase CLI)
#
# Usage:
#   docker compose up flaresolverr        # start CF bypass only
#   docker compose run scraper --source ebay_fr --limit 50 --dry-run
#   docker compose up                     # everything

services:

  # ------------------------------------------------------------------
  # Flaresolverr — Cloudflare bypass proxy
  # Used by AutoDoc scraper and any CF-protected source
  # ------------------------------------------------------------------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: partfinder_flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ------------------------------------------------------------------
  # Scraper runner — Python 3.12 + Playwright
  # Run on-demand, not as a persistent service
  # ------------------------------------------------------------------
  scraper:
    build:
      context: ./packages/scraper
      dockerfile: Dockerfile
    container_name: partfinder_scraper
    depends_on:
      flaresolverr:
        condition: service_healthy
    environment:
      FLARESOLVERR_URL: http://flaresolverr:8191
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET:-autoparts-photos}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      REQUESTS_PER_SECOND: "0.4"
      MAX_CONCURRENT_BROWSERS: "2"
    volumes:
      - ./packages/scraper:/app
    working_dir: /app
    entrypoint: ["python", "main.py"]
    # Override entrypoint: docker compose run scraper --source ebay_fr --limit 50
